# Hardware & model config for reproducible benchmarks.
# All latency / RTF numbers must be reported on this GPU.

hardware:
  provider: lightning_ai
  gpu: NVIDIA RTX PRO 6000 Blackwell Server Edition
  vram_gb: 96
  note: "Single fixed GPU for all benchmarks. Confirmed via nvidia-smi."

reference:
  path: data/reference/speaker_ref.wav
  format: mono_wav
  sample_rate_hz: 48000
  duration_sec: 22.91
  source: my-voice-sample.wav
  spoken_language: unknown  # fill in once known (affects cross-lingual cloning note)

test_sentences:
  path: data/test_sentences.json

models:
  xtts_v2:
    family: coqui
    package: coqui-tts==0.27.5
    model_name: tts_models/multilingual/multi-dataset/xtts_v2
    languages: [english, arabic, hindi]
    cloning: true
    streaming: true  # Coqui XTTS has a streaming mode; verify when wiring
    requirements: requirements/xtts.txt
    status: working  # English + Arabic XTTS on RTX PRO 6000
    notes: "Use coqui-tts (not legacy TTS). Pin transformers>=4.57,<5. Run: scripts/run_english.py / run_arabic.py"

  indic_parler_tts:
    family: ai4bharat
    model_name: ai4bharat/indic-parler-tts
    package: parler-tts==0.2.3
    languages: [hindi]
    cloning: false  # description / named-speaker only (Divya / Rohit)
    default_description: >-
      Divya's voice is monotone yet slightly fast in delivery, with a very
      close recording that almost has no background noise.
    requirements: requirements/parler.txt
    transformers_pin: "4.46.1"  # incompatible with coqui-tts (>=4.57)
    status: implemented  # pipelines/hindi_parler.py · scripts/run_hindi_parler.py
    notes: >-
      Run: python scripts/run_hindi_parler.py --device cuda
      Eval: python scripts/eval_hindi_parler.py
      Speaker cosine vs reference WAV is informational (no clone).

  chatterbox:
    family: resemble_ai
    package: chatterbox-tts==0.1.7
    model_name: ChatterboxTTS
    languages: [english]
    cloning: true  # audio_prompt_path = reference WAV
    exaggeration: 0.5
    cfg_weight: 0.5
    requirements: requirements/chatterbox.txt
    status: implemented  # pipelines/english_chatterbox.py
    notes: >-
      Run: python scripts/run_english_chatterbox.py --device cuda
      Eval: python scripts/eval_english_chatterbox.py
      Align torchvision to installed torch if import fails (see requirements/chatterbox.txt).

  fish_speech:
    family: fish_speech
    languages: [arabic]
    requirements: null
    status: skipped  # chose MMS for Arabic compare

  mms_tts:
    family: meta_mms
    model_name: facebook/mms-tts-ara
    languages: [arabic]
    cloning: false  # fixed single speaker
    requirements: requirements/mms.txt
    status: implemented  # pipelines/arabic_mms.py
    notes: >-
      Run: python scripts/run_arabic_mms.py --device cuda
      Eval: python scripts/eval_arabic_mms.py
      Needs transformers + torch only (already installed).
      Speaker cosine vs reference is informational (no clone).

eval:
  asr:
    default: openai/whisper-large-v3  # resolved to openai-whisper "large-v3"
    package: openai-whisper==20250625
    indic: whisper-large-v3  # use same model until IndicWhisper is wired
    status: implemented  # Phase 3 step 2 — eval/wer.py
  speaker_similarity:
    method: resemblyzer
    status: implemented  # Phase 3 step 3
  requirements: requirements/eval.txt
  english_runner: scripts/eval_english.py  # Phase 3 step 4

outputs_root: outputs
results_table: results/results_table.md
